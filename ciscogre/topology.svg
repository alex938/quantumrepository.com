<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" style="background: #0d1117;">
  <defs>
    <!-- Gradients -->
    <linearGradient id="routerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1f2937;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111827;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="tunnelGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#ec4899;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.8" />
    </linearGradient>
    
    <!-- Shadow filter -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.4"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Glow filter for tunnel -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Title -->
  <text x="700" y="35" font-family="'Segoe UI', Arial, sans-serif" font-size="26" font-weight="700" fill="#c9d1d9" text-anchor="middle">
    Site-to-Site GRE over IPSec VPN Topology
  </text>
  <text x="700" y="60" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">
    Secure encrypted tunnel between two office locations across the Internet
  </text>
  
  <!-- ========== SITE A SECTION ========== -->
  <rect x="50" y="100" width="450" height="680" rx="12" fill="none" stroke="#22c55e" stroke-width="2" stroke-dasharray="10,5" opacity="0.3"/>
  <text x="275" y="125" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="600" fill="#22c55e" text-anchor="middle">Site A - Headquarters</text>
  
  <!-- Router1 (Site A) -->
  <g filter="url(#shadow)">
    <rect x="150" y="160" width="250" height="110" rx="10" fill="url(#routerGrad)" stroke="#22c55e" stroke-width="2.5"/>
    <rect x="210" y="170" width="130" height="26" rx="13" fill="#166534" opacity="0.5"/>
    <text x="275" y="188" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="#22c55e" text-anchor="middle">SITE A ROUTER</text>
    
    <text x="275" y="215" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="bold" fill="#e6edf3" text-anchor="middle">Router1</text>
    <text x="275" y="238" font-family="'Consolas', monospace" font-size="10" fill="#8b949e" text-anchor="middle">Gi0/0: 192.168.10.1/24</text>
    <text x="275" y="255" font-family="'Consolas', monospace" font-size="10" fill="#8b949e" text-anchor="middle">Gi0/1: 10.10.10.1/30 (WAN)</text>
  </g>
  
  <!-- PC1 (Site A LAN) -->
  <g filter="url(#shadow)">
    <rect x="165" y="640" width="220" height="100" rx="8" fill="#0d1117" stroke="#22c55e" stroke-width="2.5"/>
    <text x="275" y="678" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="bold" fill="#e6edf3" text-anchor="middle">💻 PC1</text>
    <text x="275" y="700" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600" fill="#22c55e" text-anchor="middle">HQ Workstation</text>
    <text x="275" y="720" font-family="'Consolas', monospace" font-size="11" fill="#8b949e" text-anchor="middle">192.168.10.10/24</text>
  </g>
  
  <!-- LAN Connection Site A -->
  <line x1="275" y1="270" x2="275" y2="640" stroke="#22c55e" stroke-width="3"/>
  <rect x="230" y="440" width="90" height="45" rx="5" fill="#065f46" stroke="#22c55e" stroke-width="1.5"/>
  <text x="275" y="460" font-family="'Consolas', monospace" font-size="11" font-weight="bold" fill="#d1fae5" text-anchor="middle">LAN</text>
  <text x="275" y="477" font-family="'Consolas', monospace" font-size="9" fill="#86efac" text-anchor="middle">192.168.10.0/24</text>
  
  <!-- ========== SITE B SECTION ========== -->
  <rect x="900" y="100" width="450" height="680" rx="12" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="10,5" opacity="0.3"/>
  <text x="1125" y="125" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="600" fill="#3b82f6" text-anchor="middle">Site B - Branch Office</text>
  
  <!-- Router3 (Site B) -->
  <g filter="url(#shadow)">
    <rect x="1000" y="160" width="250" height="110" rx="10" fill="url(#routerGrad)" stroke="#3b82f6" stroke-width="2.5"/>
    <rect x="1060" y="170" width="130" height="26" rx="13" fill="#1e3a8a" opacity="0.5"/>
    <text x="1125" y="188" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="#3b82f6" text-anchor="middle">SITE B ROUTER</text>
    
    <text x="1125" y="215" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="bold" fill="#e6edf3" text-anchor="middle">Router3</text>
    <text x="1125" y="238" font-family="'Consolas', monospace" font-size="10" fill="#8b949e" text-anchor="middle">Gi0/0: 192.168.20.1/24</text>
    <text x="1125" y="255" font-family="'Consolas', monospace" font-size="10" fill="#8b949e" text-anchor="middle">Gi0/1: 10.10.20.2/30 (WAN)</text>
  </g>
  
  <!-- PC2 (Site B LAN) -->
  <g filter="url(#shadow)">
    <rect x="1015" y="640" width="220" height="100" rx="8" fill="#0d1117" stroke="#3b82f6" stroke-width="2.5"/>
    <text x="1125" y="678" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="bold" fill="#e6edf3" text-anchor="middle">💻 PC2</text>
    <text x="1125" y="700" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600" fill="#3b82f6" text-anchor="middle">Branch Workstation</text>
    <text x="1125" y="720" font-family="'Consolas', monospace" font-size="11" fill="#8b949e" text-anchor="middle">192.168.20.10/24</text>
  </g>
  
  <!-- LAN Connection Site B -->
  <line x1="1125" y1="270" x2="1125" y2="640" stroke="#3b82f6" stroke-width="3"/>
  <rect x="1080" y="440" width="90" height="45" rx="5" fill="#1e3a8a" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="1125" y="460" font-family="'Consolas', monospace" font-size="11" font-weight="bold" fill="#dbeafe" text-anchor="middle">LAN</text>
  <text x="1125" y="477" font-family="'Consolas', monospace" font-size="9" fill="#93c5fd" text-anchor="middle">192.168.20.0/24</text>
  
  <!-- ========== INTERNET CLOUD ========== -->
  <g filter="url(#shadow)">
    <ellipse cx="700" cy="240" rx="140" ry="90" fill="#111827" stroke="#6b7280" stroke-width="2.5"/>
    <text x="700" y="230" font-family="'Segoe UI', Arial, sans-serif" font-size="24" font-weight="bold" fill="#9ca3af" text-anchor="middle">☁️</text>
    <text x="700" y="255" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="600" fill="#c9d1d9" text-anchor="middle">Internet</text>
    <text x="700" y="275" font-family="'Consolas', monospace" font-size="10" fill="#6b7280" text-anchor="middle">Untrusted Network</text>
  </g>
  
  <!-- ========== WAN LINKS ========== -->
  <!-- Router1 to Internet -->
  <line x1="400" y1="240" x2="560" y2="240" stroke="#ef4444" stroke-width="3.5"/>
  <rect x="420" y="220" width="120" height="40" rx="5" fill="#450a0a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="480" y="237" font-family="'Consolas', monospace" font-size="10" font-weight="bold" fill="#fca5a5" text-anchor="middle">WAN Link</text>
  <text x="480" y="252" font-family="'Consolas', monospace" font-size="9" fill="#dc2626" text-anchor="middle">10.10.10.0/30</text>
  
  <!-- Internet to Router3 -->
  <line x1="840" y1="240" x2="1000" y2="240" stroke="#ef4444" stroke-width="3.5"/>
  <rect x="860" y="220" width="120" height="40" rx="5" fill="#450a0a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="920" y="237" font-family="'Consolas', monospace" font-size="10" font-weight="bold" fill="#fca5a5" text-anchor="middle">WAN Link</text>
  <text x="920" y="252" font-family="'Consolas', monospace" font-size="9" fill="#dc2626" text-anchor="middle">10.10.20.0/30</text>
  
  <!-- ========== GRE TUNNEL ========== -->
  <!-- Animated tunnel line -->
  <line x1="275" y1="380" x2="1125" y2="380" stroke="url(#tunnelGrad)" stroke-width="8" stroke-dasharray="20,10" filter="url(#glow)" opacity="0.9">
    <animate attributeName="stroke-dashoffset" from="0" to="30" dur="2s" repeatCount="indefinite"/>
  </line>
  
  <!-- GRE Tunnel Label -->
  <g filter="url(#shadow)">
    <rect x="570" y="330" width="260" height="100" rx="8" fill="#18181b" stroke="#8b5cf6" stroke-width="2.5"/>
    <text x="700" y="355" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="bold" fill="#c084fc" text-anchor="middle">🔐 GRE over IPSec Tunnel</text>
    <text x="700" y="377" font-family="'Consolas', monospace" font-size="11" fill="#c9d1d9" text-anchor="middle">Tunnel0: 172.16.0.0/30</text>
    <text x="700" y="395" font-family="'Consolas', monospace" font-size="10" fill="#8b949e" text-anchor="middle">Source: 10.10.10.1</text>
    <text x="700" y="410" font-family="'Consolas', monospace" font-size="10" fill="#8b949e" text-anchor="middle">Destination: 10.10.20.2</text>
    <text x="700" y="422" font-family="'Consolas', monospace" font-size="9" font-style="italic" fill="#ec4899">🔒 AES-256 Encrypted</text>
  </g>
  
  <!-- Tunnel connection indicators -->
  <line x1="275" y1="270" x2="275" y2="380" stroke="#8b5cf6" stroke-width="3" stroke-dasharray="5,5"/>
  <line x1="1125" y1="270" x2="1125" y2="380" stroke="#8b5cf6" stroke-width="3" stroke-dasharray="5,5"/>
  
  <!-- ========== ROUTER2 (ISP/Intermediate) ========== -->
  <g filter="url(#shadow)">
    <rect x="610" y="490" width="180" height="80" rx="8" fill="url(#routerGrad)" stroke="#f59e0b" stroke-width="2"/>
    <text x="700" y="520" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="bold" fill="#e6edf3" text-anchor="middle">Router2</text>
    <text x="700" y="540" font-family="'Consolas', monospace" font-size="9" fill="#f59e0b" text-anchor="middle">ISP / Intermediate</text>
    <text x="700" y="560" font-family="'Consolas', monospace" font-size="9" fill="#8b949e" text-anchor="middle">(Simulates Internet routing)</text>
  </g>
  
  <!-- Connection to Router2 -->
  <line x1="640" y1="305" x2="680" y2="490" stroke="#6b7280" stroke-width="2" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="760" y1="305" x2="720" y2="490" stroke="#6b7280" stroke-width="2" stroke-dasharray="3,3" opacity="0.5"/>
  
  <!-- ========== LEGEND ========== -->
  <g filter="url(#shadow)">
    <rect x="50" y="810" width="300" height="70" rx="8" fill="#161b22" stroke="#30363d" stroke-width="2"/>
    <text x="200" y="833" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="bold" fill="#c9d1d9" text-anchor="middle">Legend</text>
    
    <line x1="70" y1="850" x2="125" y2="850" stroke="#ef4444" stroke-width="3"/>
    <text x="135" y="854" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#c9d1d9">Physical WAN Link</text>
    
    <line x1="70" y1="868" x2="125" y2="868" stroke="#8b5cf6" stroke-width="6" stroke-dasharray="15,8" opacity="0.9"/>
    <text x="135" y="872" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#c9d1d9">Encrypted GRE Tunnel</text>
  </g>
  
  <!-- ========== INFO BOX ========== -->
  <g filter="url(#shadow)">
    <rect x="1050" y="810" width="300" height="70" rx="8" fill="#161b22" stroke="#8b5cf6" stroke-width="2"/>
    <text x="1200" y="833" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="bold" fill="#c084fc" text-anchor="middle">🔐 IPSec Security</text>
    <text x="1200" y="852" font-family="'Consolas', monospace" font-size="9" fill="#c9d1d9" text-anchor="middle">Encryption: AES-256 | Hash: SHA-256</text>
    <text x="1200" y="868" font-family="'Consolas', monospace" font-size="9" fill="#8b949e" text-anchor="middle">DH Group 5 | Pre-Shared Key Authentication</text>
  </g>
</svg>
